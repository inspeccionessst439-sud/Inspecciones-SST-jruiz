<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SST Sistema Integral</title>
    <style>
        :root {
            --primary: #003366; --accent: #ffcc00; --success: #28a745; 
            --info: #17a2b8; --secondary: #6c757d; --bg: #f4f7f6;
            --danger: #d93025; --purple: #6f42c1; --orange: #fd7e14;
            --teal: #20c997; --pink: #e83e8c;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); user-select: none; }
        .app-container { width: 100%; max-width: 600px; margin: auto; padding: 15px; box-sizing: border-box; }

        /* Estado de Conexión */
        #status { font-size: 11px; text-align: center; font-weight: bold; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-transform: uppercase; }
        .offline { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .online { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        /* Título Animado */
        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 20px; }
        .marquee-container h1 { display: inline-block; color: var(--primary); padding-left: 100%; animation: desplazar 15s linear infinite; font-size: 1.4rem; }
        @keyframes desplazar { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* Grid de Menú */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-btn { 
            background: white; border-radius: 15px; padding: 20px 10px; text-align: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; border-bottom: 4px solid transparent;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
        }
        .btn-inspecciones { border-color: var(--primary); }
        .btn-inventario { border-color: var(--purple); }
        .btn-icai { border-color: var(--orange); }
        .btn-operacional { border-color: var(--pink); }
        .btn-verificacion { border-color: var(--teal); }
        .btn-capacitaciones { border-color: var(--success); }
        .btn-charlas { border-color: var(--info); }
        .btn-opt { border-color: var(--accent); }
        .menu-btn i { font-size: 30px; }
        .menu-btn span { font-weight: bold; font-size: 11px; color: #333; }

        /* Vistas */
        .view { display: none; }
        .active-view { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Formulario */
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); font-size: 12px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        
        /* Selectores de Riesgo */
        .riesgo-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .riesgo-opt { flex: 1; padding: 10px; border-radius: 8px; text-align: center; color: white; font-weight: bold; font-size: 10px; opacity: 0.3; cursor: pointer; }
        .riesgo-opt.selected { opacity: 1; transform: scale(1.05); border: 2px solid var(--primary); }
        .r-bajo { background: var(--success); }
        .r-medio { background: var(--accent); color: #333; }
        .r-alto { background: var(--danger); }

        /* Botones de Acción */
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--primary); }
        .btn-back { background: var(--secondary); font-size: 12px; }
        
        .nav-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-nav { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #e0e0e0; }
        .btn-new-reg { flex: 2; background: var(--success); color: white; }

        #sync-count { background: var(--danger); color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="status">Verificando...</div>

    <div id="view-menu" class="view active-view">
        <div class="marquee-container"><h1>SST Sistema Integral </h1></div>
        <div class="menu-grid">
            <button class="menu-btn btn-inspecciones" onclick="mostrarVista('view-inspecciones')">
                <i>📝</i><span>Inspecciones <b id="sync-count">0</b></span>
            </button>
            <button class="menu-btn btn-inventario" onclick="alert('Módulo Offline próximamente')">
                <i>📦</i><span>Inventario</span>
            </button>
            <button class="menu-btn btn-icai" onclick="alert('Módulo Offline próximamente')">
                <i>📊</i><span>ICAI</span>
            </button>
            <button class="menu-btn btn-operacional" onclick="alert('Módulo Offline próximamente')">
                <i>⛑️</i><span>Control Mina</span>
            </button>
            <button class="menu-btn btn-verificacion" onclick="alert('Módulo Offline próximamente')">
                <i>🛡️</i><span>Verificación Herramientas</span>
            </button>
            <button class="menu-btn btn-capacitaciones" onclick="alert('Módulo Offline próximamente')">
                <i>🎓</i><span>Capacitaciones</span>
            </button>
            <button class="menu-btn btn-charlas" onclick="alert('Módulo Offline próximamente')">
                <i>📢</i><span>Charlas 5 min</span>
            </button>
            <button class="menu-btn btn-opt" onclick="alert('Módulo Offline próximamente')">
                <i>👁️</i><span>OPT</span>
            </button>
        </div>
    </div>

    <div id="view-inspecciones" class="view">
        <button class="btn-main btn-back" onclick="mostrarVista('view-menu')">⬅ Volver al Menú</button>
        <div class="card">
            <h2 id="form-title" style="text-align:center; color:var(--primary); font-size: 1.1rem; margin-top:0;">Nueva Inspección</h2>
            
            <div class="nav-group">
                <button class="btn-nav" onclick="navegarRegistro(-1)">◀ Ant.</button>
                <button class="btn-nav btn-new-reg" onclick="botonNuevo()">➕ NUEVO</button>
                <button class="btn-nav" onclick="navegarRegistro(1)">Sig. ▶</button>
            </div>

            <input type="hidden" id="edit-id">
            <label>Inspector</label>
            <input type="text" id="inspector" placeholder="Nombre">
            
            <label>Tipo</label>
            <select id="tipo">
                <option>Orden y limpieza</option>
                <option>Locativa</option>
                <option>Epp</option>
                <option>Vehículos</option>
            </select>

            <label>Lugar</label>
            <input type="text" id="lugar" placeholder="Ubicación">

            <label>Nivel de Riesgo</label>
            <div class="riesgo-selector">
                <div class="riesgo-opt r-bajo selected" id="opt-Bajo" onclick="setRiesgo('Bajo')">BAJO</div>
                <div class="riesgo-opt r-medio" id="opt-Medio" onclick="setRiesgo('Medio')">MEDIO</div>
                <div class="riesgo-opt r-alto" id="opt-Alto" onclick="setRiesgo('Alto')">ALTO</div>
            </div>
            <input type="hidden" id="riesgo" value="Bajo">

            <label>Hallazgo</label>
            <textarea id="hallazgo" rows="2"></textarea>

            <label>Foto</label>
            <input type="file" id="foto" accept="image/*" capture="camera">

            <button class="btn-main btn-save" onclick="guardarLocal()">💾 GUARDAR EN TELÉFONO</button>
            <button id="btn-eliminar" onclick="eliminarRegistro()" style="display:none; background:none; color:var(--danger); border:1px solid var(--danger); width:100%; padding:10px; border-radius:10px; font-weight:bold;">🗑️ ELIMINAR</button>
        </div>
    </div>
</div>

<script>
    let db, registros = [], indice = -1;

    // 1. Iniciar DB Offline
    const req = indexedDB.open("SST_Master_DB", 3);
    req.onupgradeneeded = e => {
        e.target.result.createObjectStore("inspecciones", { keyPath: "id", autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; refrescarMemoria(); };

    // 2. Lógica de Datos
    function refrescarMemoria() {
        const store = db.transaction("inspecciones", "readonly").objectStore("inspecciones");
        store.getAll().onsuccess = e => {
            registros = e.target.result;
            document.getElementById('sync-count').innerText = registros.length;
            document.getElementById('sync-count').style.display = registros.length ? "inline" : "none";
        };
    }

    async function guardarLocal() {
        const id = document.getElementById('edit-id').value;
        const fotoFile = document.getElementById('foto').files[0];
        let fotoData = "";

        if (fotoFile) {
            fotoData = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(fotoFile);
            });
        }

        const data = {
            inspector: document.getElementById('inspector').value,
            tipo: document.getElementById('tipo').value,
            lugar: document.getElementById('lugar').value,
            riesgo: document.getElementById('riesgo').value,
            hallazgo: document.getElementById('hallazgo').value,
            fecha: new Date().toLocaleString()
        };

        if(fotoData) data.foto = fotoData;
        if(id) data.id = parseInt(id);

        const tx = db.transaction("inspecciones", "readwrite");
        tx.objectStore("inspecciones").put(data);
        tx.oncomplete = () => {
            alert("Guardado offline con éxito");
            botonNuevo();
            refrescarMemoria();
        };
    }

    function navegarRegistro(dir) {
        if (!registros.length) return;
        indice = (indice === -1) ? registros.length - 1 : indice + dir;
        if (indice < 0) indice = 0;
        if (indice >= registros.length) indice = registros.length - 1;
        
        const reg = registros[indice];
        document.getElementById('form-title').innerText = "Viendo Registro #" + reg.id;
        document.getElementById('edit-id').value = reg.id;
        document.getElementById('inspector').value = reg.inspector;
        document.getElementById('tipo').value = reg.tipo;
        document.getElementById('lugar').value = reg.lugar;
        document.getElementById('hallazgo').value = reg.hallazgo;
        setRiesgo(reg.riesgo);
        document.getElementById('btn-eliminar').style.display = "block";
    }

    function eliminarRegistro() {
        const id = parseInt(document.getElementById('edit-id').value);
        if (!confirm("¿Borrar este registro?")) return;
        db.transaction("inspecciones", "readwrite").objectStore("inspecciones").delete(id).onsuccess = () => {
            botonNuevo();
            refrescarMemoria();
        };
    }

    // 3. UI Helpers
    function setRiesgo(v) {
        document.getElementById('riesgo').value = v;
        document.querySelectorAll('.riesgo-opt').forEach(o => o.classList.remove('selected'));
        document.getElementById('opt-' + v).classList.add('selected');
    }

    function mostrarVista(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById(id).classList.add('active-view');
    }

    function botonNuevo() {
        indice = -1;
        document.getElementById('edit-id').value = "";
        document.getElementById('inspector').value = "";
        document.getElementById('lugar').value = "";
        document.getElementById('hallazgo').value = "";
        document.getElementById('btn-eliminar').style.display = "none";
        document.getElementById('form-title').innerText = "Nueva Inspección";
        setRiesgo('Bajo');
    }

    function actualizarEstado() {
        const s = document.getElementById('status');
        const on = navigator.onLine;
        s.className = on ? "online" : "offline";
        s.innerHTML = on ? "● CONECTADO (Sincronización lista)" : "● MODO OFFLINE (Guardando en memoria local)";
    }

    window.addEventListener('online', actualizarEstado);
    window.addEventListener('offline', actualizarEstado);
    actualizarEstado();
</script>
</body>
</html>
